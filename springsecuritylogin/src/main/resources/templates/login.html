<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<meta charset="UTF-8">

<title>Login</title>

<style>

body{

font-family:Arial;
background:#f2f2f2;

}

.login-box{

width:350px;
margin:100px auto;
padding:20px;
background:white;
border-radius:10px;
box-shadow:0px 0px 10px gray;

}

input{

width:100%;
padding:10px;
margin:10px 0;

}

button{

width:100%;
padding:10px;
background:green;
color:white;
border:none;

}

.error{

color:red;

}

.logout{

color:green;

}

</style>

</head>

<body>

<div class="login-box">

<h2 align="center">Spring Security Login</h2>

<form th:action="@{/login}" method="post">

<label>Username</label>

<input type="text" name="username">

<label>Password</label>

<input type="password" name="password">

<button type="submit">Login</button>

</form>

<div th:if="${param.error}" class="error">

Invalid Username or Password

</div>

<div th:if="${param.logout}" class="logout">

Logged out Successfully

</div>

</div>

</body>
</html>
